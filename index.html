<title>Абазинско-русский словарь</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3d2c1e">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#f5f2eb;padding:20px}
.container{max-width:950px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);padding:24px}
h1{font-size:26px;color:#3d2c1e;border-bottom:3px solid #b8a48c;padding-bottom:12px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
h1 small{font-size:14px;font-weight:400;color:#7a6854;margin-left:auto}
.search-box{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.search-box input{flex:1;padding:12px 16px;border:2px solid #d6cbbc;border-radius:30px;font-size:16px;outline:none;background:#fcfaf7;transition:0.2s}
.search-box input:focus{border-color:#8b735b;background:#fff}
.search-box button{padding:12px 28px;border:none;border-radius:30px;background:#3d2c1e;color:#fff;font-size:16px;cursor:pointer;transition:0.2s;font-weight:500}
.search-box button:hover{background:#5c4533}
.letter-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:8px 0;border-bottom:1px solid #e8dfd6}
.letter-nav button{width:38px;height:38px;border:none;border-radius:50%;background:#ede7df;color:#3d2c1e;font-size:15px;font-weight:600;cursor:pointer;transition:0.15s}
.letter-nav button:hover{background:#d6cbbc}
.letter-nav button.active{background:#3d2c1e;color:#fff}
.letter-section{margin-bottom:16px}
.letter-title{font-size:22px;font-weight:700;color:#3d2c1e;background:#ede7df;padding:4px 16px;border-radius:30px;display:inline-block;margin-bottom:10px}
.entry{display:flex;padding:10px 14px;border-bottom:1px solid #f0eae2;align-items:baseline;gap:16px;transition:0.1s}
.entry:hover{background:#faf7f2}
.entry-abaza{font-weight:600;font-size:18px;color:#2d1f14;min-width:150px}
.entry-rus{color:#5c4533;font-size:17px}
.entry-rus::before{content:"— ";color:#b8a48c}
.no-result{padding:30px 0;text-align:center;color:#7a6854;font-size:18px}
.hidden{display:none}
.footer{text-align:center;margin-top:24px;font-size:13px;color:#b8a48c;border-top:1px solid #ede7df;padding-top:16px}
.alphabet-section{margin-top:30px;padding-top:20px;border-top:2px solid #b8a48c}
.alphabet-title{font-size:20px;font-weight:700;color:#3d2c1e;margin-bottom:16px;text-align:center}
.alphabet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.alphabet-item{background:#fcfaf7;border:1px solid #e8dfd6;border-radius:8px;padding:8px 6px;text-align:center;transition:0.15s}
.alphabet-item:hover{background:#ede7df;border-color:#b8a48c}
.alphabet-item .letter{font-size:22px;font-weight:700;color:#2d1f14;display:block}
.alphabet-item .sound{font-size:14px;color:#7a6854;display:block;margin-top:2px}
.alphabet-item .rus-letter{font-size:13px;color:#5c4533;display:block;margin-top:2px;font-weight:500}
</style>
</head>

let currentLetter = 'А';
let filteredData = [...dictionary];
function renderLetterNav(){
const nav=document.getElementById('letterNav');
nav.innerHTML='';
const letters=[...new Set(dictionary.map(w=>w.abaza.charAt(0)))].sort((a,b)=>cyrOrder.indexOf(a)-cyrOrder.indexOf(b));
letters.forEach(letter=>{
const btn=document.createElement('button');
btn.textContent=letter;
btn.dataset.letter=letter;
btn.onclick=()=>{currentLetter=letter; filterByLetter();};
if(letter===currentLetter) btn.classList.add('active');
nav.appendChild(btn);
});
}
function filterByLetter(){
const search=document.getElementById('searchInput').value.trim().toLowerCase();
if(search){
performSearch(search);
return;
}
const container=document.getElementById('dictionaryContainer');
container.innerHTML='';
const letterEntries=filteredData.filter(w=>w.abaza.charAt(0)===currentLetter);
if(letterEntries.length===0){
container.innerHTML='<div class="no-result">Нет слов на эту букву</div>';
return;
}
const section=document.createElement('div');
section.className='letter-section';
const title=document.createElement('div');
title.className='letter-title';
title.textContent=currentLetter;
section.appendChild(title);
letterEntries.forEach(entry=>{
const div=document.createElement('div');
div.className='entry';
const ab=document.createElement('span');
ab.className='entry-abaza';
ab.textContent=entry.abaza;
const ru=document.createElement('span');
ru.className='entry-rus';
ru.textContent=entry.rus;
div.appendChild(ab);
div.appendChild(ru);
section.appendChild(div);
});
container.appendChild(section);
document.getElementById('wordCount').textContent=dictionary.length;
}
function performSearch(query){
const container=document.getElementById('dictionaryContainer');
container.innerHTML='';
const results=filteredData.filter(w=>
w.abaza.toLowerCase().includes(query)||
w.rus.toLowerCase().includes(query)
);
if(results.length===0){
container.innerHTML='<div class="no-result">Ничего не найдено</div>';
document.getElementById('wordCount').textContent=results.length;
return;
}
const section=document.createElement('div');
section.className='letter-section';
const title=document.createElement('div');
title.className='letter-title';
title.textContent='Результаты поиска';
section.appendChild(title);
results.forEach(entry=>{
const div=document.createElement('div');
div.className='entry';
const ab=document.createElement('span');
ab.className='entry-abaza';
ab.textContent=entry.abaza;
const ru=document.createElement('span');
ru.className='entry-rus';
ru.textContent=entry.rus;
div.appendChild(ab);
div.appendChild(ru);
section.appendChild(div);
});
container.appendChild(section);
document.getElementById('wordCount').textContent=results.length;
}
function searchWord(){
const query=document.getElementById('searchInput').value.trim().toLowerCase();
if(query) performSearch(query);
else filterByLetter();
}

const val=e.target.value.trim();
if(val===''){filteredData=[...dictionary]; filterByLetter();}
